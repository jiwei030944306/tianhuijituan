name: Frontend Tests

on:
  push:
    branches: [main, master, develop, feature/**]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
          
      - name: Run tests
        working-directory: frontend
        run: npm run test
          
      - name: Build
        working-directory: frontend
        run: npm run build
